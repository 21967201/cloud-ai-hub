<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cloud AI Hub - Workers AI Chat</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0a0a0a; color: #e0e0e0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', monospace; height: 100vh; display: flex; flex-direction: column; }
    
    .header { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); padding: 16px 24px; border-bottom: 1px solid #333; }
    .header h1 { font-size: 20px; color: #f0f0f0; }
    .header p { font-size: 12px; color: #888; margin-top: 4px; }
    .header .badge { background: #ff6b35; color: white; padding: 2px 8px; border-radius: 10px; font-size: 11px; }
    
    .chat-area { flex: 1; overflow-y: auto; padding: 16px 24px; }
    .message { margin: 12px 0; display: flex; }
    .message.user { justify-content: flex-end; }
    .message.assistant { justify-content: flex-start; }
    .bubble { max-width: 70%; padding: 12px 16px; border-radius: 16px; line-height: 1.5; white-space: pre-wrap; word-wrap: break-word; }
    .message.user .bubble { background: #2563eb; color: white; border-bottom-right-radius: 4px; }
    .message.assistant .bubble { background: #1e1e1e; color: #e0e0e0; border: 1px solid #333; border-bottom-left-radius: 4px; }
    .message .avatar { font-size: 20px; margin: 0 8px; }
    
    .typing { display: none; padding: 8px 0; color: #888; font-style: italic; }
    .typing.active { display: block; }
    .typing::after { content: '...'; animation: dots 1.5s steps(3, end) infinite; }
    @keyframes dots { 0% { content: ''; } 33% { content: '.'; } 66% { content: '..'; } 100% { content: '...'; } }
    
    .input-area { padding: 16px 24px; background: #111; border-top: 1px solid #333; display: flex; gap: 8px; }
    .input-area input { flex: 1; padding: 12px 16px; background: #1e1e1e; color: #e0e0e0; border: 1px solid #333; border-radius: 8px; font-size: 14px; outline: none; }
    .input-area input:focus { border-color: #2563eb; }
    .input-area button { padding: 12px 24px; background: #2563eb; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 600; }
    .input-area button:hover { background: #1d4ed8; }
    .input-area button:disabled { background: #333; cursor: not-allowed; }
    
    .error-msg { color: #ff4444; text-align: center; padding: 8px; font-size: 13px; }
    .welcome { text-align: center; padding: 40px 20px; color: #666; }
    .welcome h2 { font-size: 24px; margin-bottom: 8px; color: #888; }
    .welcome p { font-size: 14px; }
  </style>
</head>
<body>
  <div class="header">
    <h1>☁️ Cloud AI Hub <span class="badge">Workers AI</span></h1>
    <p>Powered by Cloudflare Workers AI · @cf/meta/llama-3.1-8b-instruct</p>
  </div>
  
  <div class="chat-area" id="chat-area">
    <div class="welcome">
      <h2>👋 你好！</h2>
      <p>我是由 Cloudflare Workers AI 驱动的聊天助手</p>
      <p>有什么可以帮你的吗？</p>
    </div>
    <div class="typing" id="typing">AI 正在思考</div>
  </div>
  
  <div class="input-area">
    <input type="text" id="chat-input" placeholder="输入你的消息..." autocomplete="off">
    <button id="send-btn" onclick="sendMessage()">发送</button>
  </div>

  <script>
    let chatHistory = [];
    let isLoading = false;

    function addMessage(content, role) {
      const area = document.getElementById('chat-area');
      const welcome = area.querySelector('.welcome');
      if (welcome) welcome.remove();
      
      const msg = document.createElement('div');
      msg.className = 'message ' + role;
      
      const avatar = document.createElement('span');
      avatar.className = 'avatar';
      avatar.textContent = role === 'user' ? '👤' : '🤖';
      
      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      bubble.textContent = content;
      
      if (role === 'user') {
        msg.appendChild(bubble);
        msg.appendChild(avatar);
      } else {
        msg.appendChild(avatar);
        msg.appendChild(bubble);
      }
      
      const typing = document.getElementById('typing');
      area.insertBefore(msg, typing);
      area.scrollTop = area.scrollHeight;
    }

    function showError(msg) {
      const area = document.getElementById('chat-area');
      const err = document.createElement('div');
      err.className = 'error-msg';
      err.textContent = msg;
      const typing = document.getElementById('typing');
      area.insertBefore(err, typing);
      area.scrollTop = area.scrollHeight;
      setTimeout(() => err.remove(), 5000);
    }

    function setLoading(v) {
      isLoading = v;
      document.getElementById('typing').className = 'typing' + (v ? ' active' : '');
      document.getElementById('send-btn').disabled = v;
    }

    async function sendMessage() {
      const input = document.getElementById('chat-input');
      const message = input.value.trim();
      if (!message || isLoading) return;
      
      addMessage(message, 'user');
      chatHistory.push({ role: 'user', content: message });
      input.value = '';
      setLoading(true);
      
      try {
        const response = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message, history: chatHistory })
        });
        
        const data = await response.json();
        
        if (data.error) {
          showError('❌ ' + data.error);
        } else {
          addMessage(data.message, 'assistant');
          chatHistory = data.history || chatHistory;
        }
      } catch (error) {
        showError('❌ 连接错误: ' + error.message);
      } finally {
        setLoading(false);
      }
    }

    document.getElementById('chat-input').addEventListener('keydown', function(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });
  </script>
</body>
</html>
